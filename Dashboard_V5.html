<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISIS Mission Control v5.0 | The Living Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #0066ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --glass-bg: rgba(0, 242, 255, 0.05);
            --glass-border: rgba(0, 242, 255, 0.2);
            --text-color: #E0FFFF;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            background: radial-gradient(circle at center, #001a33 0%, #000000 100%);
        }

        /* Sidebar Navigation - Fixed & Visible */
        #side-nav {
            width: 80px;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-right: 1px solid var(--neon-cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            z-index: 1000;
            box-shadow: 5px 0 25px rgba(0, 242, 255, 0.2);
        }

        .nav-item {
            width: 55px;
            height: 55px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.4rem;
            position: relative;
        }

        .nav-item:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transform: scale(1.1);
        }

        .nav-item.active {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6), inset 0 0 10px rgba(0, 242, 255, 0.3);
            transform: scale(1.15);
        }

        /* Main Viewport */
        #main-viewport {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
            perspective: 2000px;
        }

        .hud-screen {
            position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            opacity: 0;
            visibility: hidden;
            transform: translateZ(-100px) rotateX(5deg);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
        }

        .hud-screen.active {
            opacity: 1;
            visibility: visible;
            transform: translateZ(0) rotateX(0);
        }

        /* Glass Panels */
        .glass-panel {
            background: rgba(0, 10, 20, 0.6);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        /* Avatar Section - 3D Simulation */
        .isis-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
        }

        .avatar-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .avatar-frame {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            overflow: hidden;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            position: relative;
            background: black;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.9);
            transition: transform 0.5s ease;
        }

        /* Eye Blinking Effect (Pseudo-3D Animation) */
        .eye-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0);
            pointer-events: none;
            z-index: 10;
        }

        /* Subtitle Window */
        .subtitle-box {
            width: 80%;
            max-width: 600px;
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--neon-cyan);
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            min-height: 100px;
        }

        /* Header Info */
        .header-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            z-index: 100;
        }

        .title-group h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 6px;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.8);
        }

        /* Mic Button */
        #mic-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            color: var(--neon-cyan);
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        #mic-btn.active {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 50px var(--neon-cyan);
            animation: mic-pulse 1.5s infinite;
        }

        @keyframes mic-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(0, 242, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }

        /* Stats Widgets */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 350px;
            position: absolute;
            right: 30px;
            top: 100px;
        }

        .stat-card {
            padding: 15px;
            text-align: center;
        }

        .stat-label { font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon-cyan); margin-top: 5px; }

    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav id="side-nav">
        <div class="nav-item active" data-target="command-center"><i class="fas fa-home"></i></div>
        <div class="nav-item" data-target="crypto-nexus"><i class="fas fa-chart-line"></i></div>
        <div class="nav-item" data-target="chronicles"><i class="fas fa-archive"></i></div>
    </nav>

    <!-- Main Viewport -->
    <main id="main-viewport">
        <header class="header-info">
            <div class="title-group">
                <h1>ISIS CORE HUD</h1>
                <div style="font-size: 0.7rem; color: #00ffaa; opacity: 0.8;">V5.0 NEURAL LINK ACTIVE</div>
            </div>
            <div class="glass-panel" style="padding: 10px 20px; text-align: right;">
                <div id="clock" style="font-family: 'Orbitron'; font-size: 1.3rem;">00:00:00</div>
                <div id="date" style="font-size: 0.7rem; opacity: 0.6;">MARCH 10, 2026</div>
            </div>
        </header>

        <!-- COMMAND CENTER -->
        <section id="command-center" class="hud-screen active">
            <div class="isis-display">
                <div class="avatar-container" id="avatar-3d">
                    <div class="avatar-frame">
                        <img src="./isis_avatar.png" alt="Isis v5.0" class="avatar-img" id="isis-img">
                    </div>
                </div>
                <div class="subtitle-box" id="subtitle-box">
                    대기 중입니다, 엔디. 무엇을 도와드릴까요?
                </div>
            </div>

            <div class="stats-grid">
                <div class="glass-panel stat-card">
                    <div class="stat-label">System</div>
                    <div class="stat-value">Stable</div>
                </div>
                <div class="glass-panel stat-card">
                    <div class="stat-label">Cognition</div>
                    <div class="stat-value">100%</div>
                </div>
                <div class="glass-panel stat-card" style="grid-column: span 2;">
                    <div class="stat-label">BTC Market</div>
                    <div class="stat-value" id="btc-val">102.3M</div>
                </div>
            </div>
        </section>

        <!-- CRYPTO NEXUS -->
        <section id="crypto-nexus" class="hud-screen glass-panel">
            <h2 style="font-family: 'Orbitron'; letter-spacing: 5px;">CRYPTO NEXUS</h2>
            <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
                <canvas id="btcChart" style="max-height: 400px;"></canvas>
            </div>
        </section>

        <!-- CHRONICLES -->
        <section id="chronicles" class="hud-screen glass-panel">
            <h2 style="font-family: 'Orbitron'; letter-spacing: 5px;">CHRONICLES</h2>
            <div id="logs" style="overflow-y: auto; font-family: 'Share Tech Mono'; font-size: 0.9rem;">
                <p>> System restoration successful.</p>
                <p>> New 3D Avatar engine initialized.</p>
                <p>> Multi-layer HUD deployed.</p>
            </div>
        </section>
    </main>

    <div id="mic-btn"><i class="fas fa-microphone"></i></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navItems = document.querySelectorAll('.nav-item');
            const screens = document.querySelectorAll('.hud-screen');
            const avatar = document.getElementById('avatar-3d');
            const isisImg = document.getElementById('isis-img');
            const micBtn = document.getElementById('mic-btn');
            const subtitle = document.getElementById('subtitle-box');

            // 1. Navigation Logic
            function switchScreen(id) {
                navItems.forEach(item => item.classList.remove('active'));
                screens.forEach(screen => screen.classList.remove('active'));

                document.querySelector(`[data-target="${id}"]`).classList.add('active');
                document.getElementById(id).classList.add('active');
            }

            navItems.forEach(item => {
                item.addEventListener('click', () => switchScreen(item.dataset.target));
                item.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    switchScreen(item.dataset.target);
                });
            });

            // 2. 3D Interaction Simulation (Parallax)
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                avatar.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                isisImg.style.transform = `scale(1.1) translateX(${-xAxis}px) translateY(${-yAxis}px)`;
            });

            // 3. Mic & Dialogue Simulation
            const responses = [
                "엔디, 비트코인은 현재 전고점 돌파를 시도하고 있습니다. 시장 심리가 아주 뜨겁네요!",
                "오늘의 기술 브리핑은 AI 에이전틱 워크플로우의 미래에 대해 준비했어요. 들어보시겠어요?",
                "보안 프로토콜 이상 무. 모든 기록은 암호화되어 안전하게 보관되고 있습니다."
            ];
            let resIdx = 0;

            micBtn.addEventListener('click', () => {
                micBtn.classList.toggle('active');
                if (micBtn.classList.contains('active')) {
                    subtitle.textContent = "듣고 있습니다...";
                    setTimeout(() => {
                        micBtn.classList.remove('active');
                        subtitle.textContent = responses[resIdx];
                        resIdx = (resIdx + 1) % responses.length;
                    }, 2500);
                }
            });

            // 4. Clock
            setInterval(() => {
                document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
            }, 1000);

            // 5. Chart
            const ctx = document.getElementById('btcChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['01', '02', '03', '04', '05', '06'],
                    datasets: [{
                        label: 'BTC Trend',
                        data: [101, 102, 100, 103, 102, 104],
                        borderColor: '#00f2ff',
                        backgroundColor: 'rgba(0, 242, 255, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { x: { ticks: { color: '#fff' } }, y: { ticks: { color: '#fff' } } }
                }
            });
        });
    </script>
</body>
</html>
